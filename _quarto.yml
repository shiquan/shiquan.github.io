project:
  type: website
  output-dir: docs
  resources:
    - "navigation.js"
website:
  page-navigation: true
  back-to-top-navigation: true
  reader-mode: false
  navbar:
    pinned: true
    collapse: false
    title: false
    background: light
    left:
      - href: index.qmd
        text: Overview
      - href: fastq.qmd
        text: FASTQ+
      - href: PISA.qmd
        text: PISA
      - href: Yano.qmd
        text: Yano
    tools:
      - icon: github
        text: GitHub
        menu:
          - text: My GitHub Page
            href: https://github.com/shiquan
          - text: Discussions
            href: https://github.com/shiquan/Yano/discussions
  sidebar: false

format:
  html:
    theme:
      light: [theme.scss]
      dark: [theme-dark.scss]
    code-copy: true
    css: styles.css
    toc: true
    toc-location: body
    code-overflow: wrap
    code-block-background: true
    code-block-border-left: true
    page-layout: full
    fontsize: 0.875em
    highlight-style: github
engine: knitr
editor: visual
execute:
  freeze: auto
